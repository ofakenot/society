<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<title>BRX Society — Candidatura</title>
<style>
:root{
  --bg:#050505;--white:#f0ebe3;--white-dim:rgba(240,235,227,.5);
  --gray:#6e6e6e;--gray2:#2e2e2e;
  --accent:#c8b97a;--accent-dim:rgba(200,185,122,.13);--accent-border:rgba(200,185,122,.3);
  --b:rgba(255,255,255,.065);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.03);
  --r:2px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.5}

/* NAV */
nav{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:14px clamp(16px,4vw,48px);border-bottom:1px solid var(--b);background:rgba(5,5,5,.95);backdrop-filter:blur(20px);z-index:100}
.nav-logo{display:flex;align-items:center}
.nav-center{display:flex;align-items:center;gap:8px}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#5cb85c;animation:pulse 2.5s infinite}
.nav-status{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray2)}
.nav-back{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);text-decoration:none;display:flex;align-items:center;gap:7px;transition:color .2s}
.nav-back:hover{color:var(--white)}
.nav-back svg{width:11px;height:11px;transition:transform .2s}
.nav-back:hover svg{transform:translateX(-2px)}

/* PROGRESS */
.prog-wrap{flex-shrink:0;height:2px;background:var(--gray2)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-border),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* CHAT AREA */
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px clamp(16px,4vw,48px);display:flex;flex-direction:column;gap:14px}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:2px}

/* MESSAGES */
.msg{display:flex;gap:10px;animation:msgIn .3s ease forwards;opacity:0}
.msg.bot{align-self:flex-start;max-width:min(600px,90%)}
.msg.user{align-self:flex-end;max-width:min(480px,80%);flex-direction:row-reverse}

/* AVATAR — usa um único SVG estático sem gradiente para evitar conflito de IDs */
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;border:1px solid var(--b2);background:#0e0e0e;display:flex;align-items:center;justify-content:center;margin-top:2px;overflow:hidden}
.msg-avatar-img{width:20px;height:20px}

.msg-bubble{padding:12px 16px;border-radius:var(--r);font-size:14px;line-height:1.75}
.msg.bot .msg-bubble{background:#0e0e0e;border:1px solid var(--b);border-left:2px solid var(--accent-border);color:var(--white-dim)}
.msg.bot .msg-bubble strong{color:var(--white);font-weight:500}
.msg.user .msg-bubble{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--white)}

/* TYPING */
.typing-bubble{display:flex;align-items:center;gap:5px;padding:14px 16px;background:#0e0e0e;border:1px solid var(--b);border-left:2px solid var(--accent-border);border-radius:var(--r)}
.typing-bubble span{width:5px;height:5px;border-radius:50%;background:var(--gray2);animation:dot 1.2s infinite}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}

/* OPTIONS */
.choices{display:flex;flex-wrap:wrap;gap:8px;padding-left:42px;animation:msgIn .3s .1s ease forwards;opacity:0}
.choice-btn{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 15px;background:transparent;color:var(--gray);border:1px solid var(--gray2);border-radius:var(--r);cursor:pointer;transition:all .18s}
.choice-btn:hover{border-color:var(--accent-border);color:var(--white);background:var(--accent-dim)}
.choice-btn:disabled{opacity:.4;pointer-events:none}
.choice-btn.picked{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}

/* MULTI SELECT */
.multi-choices{display:flex;flex-wrap:wrap;gap:8px;padding-left:42px;animation:msgIn .3s .1s ease forwards;opacity:0}
.multi-btn{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 15px;background:transparent;color:var(--gray);border:1px solid var(--gray2);border-radius:var(--r);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px}
.multi-btn:hover{border-color:var(--b2);color:var(--white)}
.multi-btn.on{border-color:var(--accent-border);color:var(--white);background:var(--accent-dim)}
.multi-btn .chk{width:9px;height:9px;stroke:var(--accent);stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s;flex-shrink:0}
.multi-btn.on .chk{opacity:1}
.multi-ok{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-left:42px;margin-top:6px;padding:10px 22px;background:var(--white);color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;transition:all .2s;display:none;align-items:center;gap:8px}
.multi-ok.show{display:inline-flex}
.multi-ok:hover{background:var(--accent)}

/* INPUT AREA */
.input-area{flex-shrink:0;padding:14px clamp(16px,4vw,48px);border-top:1px solid var(--b);background:rgba(5,5,5,.95);display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1}
#chatInput{width:100%;background:var(--b3);border:1px solid var(--gray2);border-radius:var(--r);padding:12px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;line-height:1.5;transition:border-color .2s;min-height:46px;max-height:110px;overflow-y:auto}
#chatInput::placeholder{color:rgba(255,255,255,.15)}
#chatInput:focus{border-color:var(--accent-border)}
#chatInput:disabled{opacity:.3;pointer-events:none}
.send-btn{width:46px;height:46px;flex-shrink:0;background:var(--white);border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.send-btn:hover{background:var(--accent);transform:translateY(-1px)}
.send-btn:disabled{opacity:.3;pointer-events:none;transform:none}
.send-btn svg{width:15px;height:15px;stroke:var(--bg);stroke-width:2;fill:none}

/* SUCCESS */
.success-screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.success-screen.on{display:flex}
.suc-sym{display:flex;gap:12px;margin-bottom:28px}
.suc-sym span{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
.suc-title{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(26px,5vw,46px);line-height:1.05;letter-spacing:-.025em;margin-bottom:14px;padding-bottom:.06em}
.suc-title .ghost{color:transparent;-webkit-text-stroke:1px rgba(240,235,227,.18)}
.suc-msg{font-size:14px;color:var(--white-dim);line-height:1.8;margin-bottom:24px;max-width:380px}
.suc-msg strong{color:var(--white);font-weight:500}
.suc-tag{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;color:var(--gray2);letter-spacing:.22em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.suc-tag::before,.suc-tag::after{content:'';width:20px;height:1px;background:var(--gray2)}

/* FOOTER */
footer{flex-shrink:0;border-top:1px solid var(--b);padding:10px clamp(16px,4vw,48px);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.foot-logo{display:flex;align-items:center}
.foot-copy{font-size:8px;font-family:'Unbounded',sans-serif;font-weight:700;color:var(--gray2);letter-spacing:.16em;text-transform:uppercase}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

@media(max-width:480px){
  .choices,.multi-choices,.multi-ok{padding-left:0;margin-left:0}
  .nav-center{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <svg width="150" height="30" viewBox="0 0 200 38" xmlns="http://www.w3.org/2000/svg">

<!-- PROGRESS -->
<div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>

<!-- CHAT -->

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">

<!-- INPUT -->

    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- FOOTER -->
<footer>
  <div class="foot-logo">
    <svg width="120" height="24" viewBox="0 0 200 38" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="28" font-family="Verdana,sans-serif" font-weight="900" font-style="italic" font-size="20" fill="url(#brxGrad)" letter-spacing="-1">BRX</text>
      <text x="46" y="28" font-family="Inter,sans-serif" font-weight="300" font-size="17" fill="#ffffff">SOCIETY</text>
      <rect x="0" y="33" width="40" height="2.5" fill="url(#brxGrad)"/>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ─────────────────────────────────────
   1. CONFIGURAÇÃO SUPABASE (CHAVES REAIS)
   ───────────────────────────────────── */
const SUPABASE_URL = 'https://erivjjmoxxieposrxsko.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_WjXUl18HA8U7R9C1rsU8bw__s0RWW3j'; // Chave "default" do seu print
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ─────────────────────────────────────
   2. STATE & FLOW
   ───────────────────────────────────── */
const ans = {};           
let currentStep = 0;      
let busy = false;         
let multiSel = [];        

const FLOW = [
  {
    msg: 'Olá. Você está iniciando sua candidatura para a <strong>BRX Society</strong>.<br><br>Este é um clube fechado. Vagas limitadas, acesso por aprovação interna.<br><br>Pronto para começar?',
    type: 'options',
    opts: ['Sim, vamos lá', 'Quero saber mais'],
    branch: { 'Quero saber mais': 1, 'Sim, vamos lá': 2 }
  },
  {
    msg: 'A BRX Society reúne empresários, investidores e profissionais de alta performance.<br><br>Mais do que um clube — um <strong>ambiente onde negócios se constroem fora das salas de reunião</strong>. Corridas. Jantares fechados. Masterminds reais.<br><br>Pronto para candidatar?',
    type: 'options',
    opts: ['Sim, quero me candidatar'],
    branch: { 'Sim, quero me candidatar': 2 }
  },
  { msg: 'Qual é o seu <strong>nome completo</strong>?', type: 'input', key: 'nome', ph: 'Seu nome', req: true, min: 3 },
  { msg: () => `Prazer, <strong>${firstName()}</strong>. Como prefere ser chamado? <em style="color:var(--gray);font-weight:300;font-size:13px">opcional</em>`, type: 'input_opt', key: 'apelido', ph: 'Apelido — ou Enter para pular' },
  { msg: 'Qual o seu <strong>WhatsApp</strong>?', type: 'input', key: 'whatsapp', ph: '(11) 99999-9999', req: true, min: 8 },
  { msg: 'E o seu <strong>e-mail</strong>?', type: 'input', key: 'email', ph: 'seu@email.com', req: true, isEmail: true },
  { msg: 'De qual <strong>cidade</strong> você é?', type: 'input', key: 'cidade', ph: 'São Paulo — SP', req: true, min: 2 },
  { msg: 'Seu <strong>Instagram</strong>? <em style="color:var(--gray);font-weight:300;font-size:13px">opcional</em>', type: 'input_opt', key: 'instagram', ph: '@seuhandle' },
  {
    msg: 'Como você se define <strong>profissionalmente</strong>?',
    type: 'options', key: 'perfil',
    opts: ['Empresário / Sócio-fundador','Investidor','Dono de marca / e-commerce','Executivo C-level','Profissional liberal','Outro']
  },
  { msg: 'Qual é o nome da sua <strong>empresa ou marca</strong>?', type: 'input', key: 'empresa', ph: 'Nome ou segmento', req: true, min: 1 },
  { msg: 'Em qual <strong>setor</strong> você atua?', type: 'input', key: 'setor', ph: 'Tecnologia, saúde, varejo...', req: true, min: 2 },
  {
    msg: 'Qual o <strong>faturamento anual</strong> aproximado do seu negócio?',
    type: 'options', key: 'faturamento',
    opts: ['Até R$ 500 mil','R$ 500k – R$ 2 mi','R$ 2 mi – R$ 10 mi','R$ 10 mi – R$ 50 mi','Acima de R$ 50 mi','Prefiro não informar']
  },
  {
    msg: 'A BRX Society tem um pilar forte em <strong>fitness e corridas</strong>. Como você está nessa?',
    type: 'options', key: 'corrida',
    opts: ['Corro competitivamente','Corro recreativamente','Estou começando','Ainda não pratico']
  },
  {
    msg: 'Que outras <strong>atividades</strong> você pratica? <em style="color:var(--gray);font-weight:300;font-size:13px">selecione quantas quiser</em>',
    type: 'multi', key: 'atividades',
    opts: ['Musculação','Ciclismo','Natação','Lutas / MMA','Crossfit','Trail / Trilhas','Nenhuma']
  },
  {
    msg: 'O que mais te <strong>atrai</strong> na BRX Society? <em style="color:var(--gray);font-weight:300;font-size:13px">pode marcar vários</em>',
    type: 'multi', key: 'interesses',
    opts: ['Networking elite','Mastermind / Estratégia','Corridas & eventos','Jantares exclusivos','Mentorias','Investimentos','Marketing & branding','Performance mental']
  },
  { msg: 'O que você poderia <strong>contribuir</strong> para a comunidade?<br><em style="color:var(--gray);font-weight:300;font-size:13px">Conhecimento, rede, experiência — seja específico.</em>', type: 'input', key: 'contribuicao', ph: 'Descreva sua contribuição...', req: true, min: 10 },
  { msg: 'Por que você quer entrar na BRX Society?<br><em style="color:var(--gray);font-weight:300;font-size:13px">Seja direto. O que te move?</em>', type: 'input', key: 'motivacao', ph: 'Sua motivação...', req: true, min: 15 },
  { msg: 'Foi indicado por algum <strong>membro</strong>? <em style="color:var(--gray);font-weight:300;font-size:13px">opcional</em>', type: 'input_opt', key: 'indicado_por', ph: 'Nome do membro ou deixe em branco' },
  {
    msg: 'Como você ficou sabendo da <strong>BRX Society</strong>?',
    type: 'options', key: 'como_conheceu',
    opts: ['Indicação de membro','Instagram','LinkedIn','Evento presencial','Outro']
  },
  {
    msg: () => `Perfeito, <strong>${firstName()}</strong>. Confirma o envio de sua candidatura?`,
    type: 'options',
    opts: ['Confirmar e enviar'],
    branch: { 'Confirmar e enviar': 'submit' }
  }
];

const TOTAL = FLOW.length - 1; 

/* ─────────────────────────────────────
   3. HELPERS & UI (ID's padrão)
   ───────────────────────────────────── */
const chatArea = document.getElementById('chatArea');
const progFill  = document.getElementById('progFill');
const inputEl   = document.getElementById('chatInput');
const sendBtn   = document.getElementById('sendBtn');

function firstName(){ return (ans.nome || '').split(' ')[0] || ''; }

function scrollBottom(){
  requestAnimationFrame(() => { if(chatArea) chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }); });
}

function setProgress(idx){
  if(!progFill) return;
  const pct = Math.min(Math.round((idx / TOTAL) * 95), 95);
  progFill.style.width = pct + '%';
}

function avatarHTML(){
  return `<div class="msg-avatar"><svg class="msg-avatar-img" viewBox="0 0 40 40"><text x="2" y="30" font-family="Verdana" font-weight="900" font-style="italic" font-size="28" fill="url(#brxGrad)">B</text></svg></div>`;
}

function botMsg(html){
  return new Promise(resolve => {
    const row = document.createElement('div'); row.className = 'msg bot';
    row.innerHTML = `${avatarHTML()}<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(row); scrollBottom();
    const delay = Math.max(500, Math.min(html.replace(/<[^>]+>/g,'').length * 15, 1600));
    setTimeout(() => { row.innerHTML = `${avatarHTML()}<div class="msg-bubble">${html}</div>`; scrollBottom(); resolve(); }, delay);
  });
}

function userMsg(text){
  const row = document.createElement('div'); row.className = 'msg user';
  row.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chatArea.appendChild(row); scrollBottom();
}

function enableInput(ph, opt){
  if(!inputEl) return; inputEl.placeholder = ph; inputEl.disabled = false; sendBtn.disabled = false;
  inputEl.value = ''; inputEl._optional = !!opt; autoResize(); setTimeout(() => inputEl.focus(), 50);
}

function disableInput(){ if(inputEl){ inputEl.disabled = true; sendBtn.disabled = true; } }

function autoResize(){ inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px'; }

if(inputEl){
  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); } });
}
if(sendBtn) sendBtn.addEventListener('click', handleSend);

/* ─────────────────────────────────────
   4. FUNÇÕES DE INTERAÇÃO
   ───────────────────────────────────── */
function showOptions(opts, onPick){
  const wrap = document.createElement('div'); wrap.className = 'choices';
  opts.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.textContent = opt;
    btn.addEventListener('click', () => { if (busy) return; wrap.querySelectorAll('.choice-btn').forEach(b => b.disabled = true); btn.classList.add('picked'); userMsg(opt); onPick(opt); });
    wrap.appendChild(btn);
  });
  chatArea.appendChild(wrap); scrollBottom();
}

function showMulti(opts, onDone){
  multiSel = []; const wrap = document.createElement('div'); wrap.className = 'multi-choices';
  const okBtn = document.createElement('button'); okBtn.className = 'multi-ok'; okBtn.innerHTML = 'Confirmar';
  opts.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'multi-btn'; btn.textContent = opt;
    btn.addEventListener('click', () => { const on = btn.classList.toggle('on'); if(on) multiSel.push(opt); else multiSel = multiSel.filter(x => x!==opt); okBtn.classList.toggle('show', multiSel.length > 0); });
    wrap.appendChild(btn);
  });
  okBtn.addEventListener('click', () => { if(!multiSel.length) return; userMsg(multiSel.join(', ')); wrap.remove(); okBtn.remove(); onDone(multiSel.join(', ')); });
  chatArea.appendChild(wrap); chatArea.appendChild(okBtn); scrollBottom();
}

async function handleSend(){
  if (busy || inputEl.disabled) return;
  const val = inputEl.value.trim(); const step = FLOW[currentStep];
  if (!inputEl._optional && !val){ inputEl.classList.add('shake'); setTimeout(()=>inputEl.classList.remove('shake'), 400); return; }
  disableInput(); userMsg(val || '—'); if (step.key) ans[step.key] = val; await advance(currentStep + 1);
}

async function advance(nextIdx){
  if (busy) return; busy = true;
  if (nextIdx === 'submit'){ busy = false; await doSubmit(); return; }
  currentStep = nextIdx; setProgress(currentStep);
  const step = FLOW[currentStep]; if (!step){ busy = false; return; }
  await botMsg(typeof step.msg === 'function' ? step.msg() : step.msg);
  busy = false; 
  if (step.type === 'options' || step.type === 'branch'){
    showOptions(step.opts, async (p) => { if(step.key) ans[step.key] = p; await advance(step.branch ? step.branch[p] : currentStep + 1); });
  } else if (step.type === 'multi'){
    showMulti(step.opts, async (v) => { ans[step.key] = v; await advance(currentStep + 1); });
  } else { enableInput(step.ph, step.type === 'input_opt'); }
}

/* ─────────────────────────────────────
   5. ENVIO PARA O SUPABASE
   ───────────────────────────────────── */
async function doSubmit(){
  await botMsg('Salvando sua candidatura no sistema da BRX Society...');
  if(progFill) progFill.style.width = '100%';

  try {
    const { error } = await _supabase
      .from('candidaturas')
      .insert([ans]); // Envia as respostas coletadas

    if (error) throw error;
    showSuccess();
  } catch(e) {
    console.error("Erro Supabase:", e);
    alert("Houve um erro ao salvar os dados. Por favor, tente novamente.");
  }
}

function showSuccess(){
  if(chatArea) chatArea.style.display = 'none';
  if(document.getElementById('inputArea')) document.getElementById('inputArea').style.display = 'none';
  if(document.getElementById('successScreen')) document.getElementById('successScreen').classList.add('on');
}

window.addEventListener('load', () => setTimeout(() => advance(0), 400));
</script>
